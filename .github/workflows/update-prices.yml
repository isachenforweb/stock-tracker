name: 每日更新股價

on:
  schedule:
    # 06:20 UTC = 台北 14:20（交易日盤後）。GitHub 排程可能延遲數分鐘屬正常。
    - cron: "20 6 * * 1-5"
  workflow_dispatch: {}   # 允許在 Actions 頁面手動按「Run workflow」

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 抓取收盤價
        run: python3 scripts/update_prices.py

      - name: 有變動才 commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json data/history.json
          if git diff --staged --quiet; then
            echo "今日無價格變動，略過 commit"
          else
            git commit -m "自動更新股價 $(TZ=Asia/Taipei date +%Y-%m-%d)"
            git push
          fi
